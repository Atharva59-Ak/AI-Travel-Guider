<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #4338ca; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .error { background: #fee; color: #c00; }
        .success { background: #efe; color: #060; }
    </style>
</head>
<body>
    <h1>🚂 Train API Direct Test</h1>
    
    <div class="test-section">
        <h2>Test Routes</h2>
        <button onclick="testRoute('delhi', 'mumbai')">Delhi → Mumbai</button>
        <button onclick="testRoute('delhi', 'kolkata')">Delhi → Kolkata</button>
        <button onclick="testRoute('mumbai', 'bangalore')">Mumbai → Bangalore</button>
        <button onclick="testRoute('chennai', 'delhi')">Chennai → Delhi</button>
        <button onclick="testRoute('xyz', 'abc')">Unknown Route</button>
    </div>

    <div class="test-section">
        <h2>Result:</h2>
        <div id="result"></div>
    </div>

    <script>
        async function testRoute(from, to) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const url = `/api/trains?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&limit=6`;
                console.log('Fetching:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                
                resultDiv.className = 'success';
                resultDiv.innerHTML = `
                    <h3>✅ Success!</h3>
                    <p><strong>From:</strong> ${data.fromStationCode}</p>
                    <p><strong>To:</strong> ${data.toStationCode}</p>
                    <p><strong>Trains Found:</strong> ${data.trains.length}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h3>❌ Error</h3>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
